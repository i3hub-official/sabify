<!doctype html>
<html lang="en" class="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest">
<meta name="theme-color" content="#7C3AED">
				<meta name="description" content="Sabify - The academic fortress for Nigerian university students" />
		
		<!-- CRITICAL: Apply theme before any content renders -->
		<script>
			(function() {
				try {
					const savedTheme = localStorage.getItem('theme');
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const theme = savedTheme || (prefersDark ? 'dark' : 'light');
					document.documentElement.classList.add(theme);
					if (theme === 'dark') {
						document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1E1B2E');
					}
				} catch(e) {}
			})();
		</script>
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
